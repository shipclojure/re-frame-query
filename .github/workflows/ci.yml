name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Cache Maven deps
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('deps.edn') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Install npm dependencies
        run: pnpm install

      - name: Run ClojureScript tests
        run: pnpm test

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Cache Maven deps
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('deps.edn') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Install root npm dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build reagent example app
        run: |
          cd examples/reagent-app
          pnpm install
          pnpm exec msw init resources/public --save
          pnpm run mocks
          pnpm exec shadow-cljs compile demo

      - name: Build UIx example app
        run: |
          cd examples/uix-app
          pnpm install
          pnpm exec msw init resources/public --save
          pnpm run mocks
          pnpm exec shadow-cljs compile demo

      - name: Start servers and run Playwright tests
        run: |
          python3 -m http.server 8710 -d examples/reagent-app/resources/public &
          python3 -m http.server 8720 -d examples/uix-app/resources/public &
          # Wait for servers
          for port in 8710 8720; do
            for i in $(seq 1 15); do
              curl -sf http://localhost:$port > /dev/null && break || sleep 1
            done
          done
          pnpm test:e2e
